# Render blueprint for IFT Finance.
# Single web service — sync + daily digest run as background threads inside
# the same process so they share the SQLite disk. Render cron jobs can't
# mount disks, so we don't use them.

services:
  - type: web
    name: ift-finance
    runtime: docker
    plan: starter            # $7/mo — keeps the disk persistent + always on
    dockerfilePath: ./v2/Dockerfile
    dockerContext: ./v2
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: ift-finance-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /data
      - key: PORT
        value: 10000
      - key: IFT_FIN_PASS
        sync: false
      - key: IFT_FIN_SECRET
        generateValue: true
      - key: OP_APP_ID
        sync: false
      - key: OP_API_KEY
        sync: false
      - key: IFT_SALES_BOARD_URL
        sync: false
      - key: IFT_SALES_BOARD_TOKEN
        sync: false
      - key: IFT_SMTP_USER
        value: adam@imageft.ie
      - key: IFT_SMTP_PASS
        sync: false
      - key: IFT_DIGEST_TO
        value: adam@imageft.ie
      - key: IFT_DASHBOARD_URL
        value: https://finance.imageft.ie
      - key: IFT_SCHEDULER
        value: "1"
      - key: IFT_SYNC_INTERVAL_SEC
        value: "600"           # 10 minutes
      - key: IFT_DIGEST_HOUR_UTC
        value: "8"             # 09:00 Dublin (winter) / 10:00 (summer)
